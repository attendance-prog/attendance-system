<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Classroom Usage</title>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.header{
background:#1b5e20;
color:white;
padding:15px;
font-size:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<div class="header">
🏫 Classroom Usage
</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>Room</th>
<th>Subject</th>
<th>Faculty</th>
<th>Time</th>

</tr>

</thead>

<tbody id="data"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"getClassroomUsage"
})

})
.then(r=>r.json())
.then(res=>{

const tbody=document.getElementById("data");

res.data.forEach(r=>{

tbody.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
</tr>
`;

})

})

</script>

</body>
</html>
