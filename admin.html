<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO GREEN – Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="admin"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>
    🌱 GO GREEN – Admin Dashboard<br>
    <small id="greet"></small>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2>Select Feature</h2>

  <div class="grid">

    <div class="card" onclick="go('admin-users.html')">
      👥 Users Panel
    </div>

    <div class="card" onclick="go('admin-analytics.html')">
      📊 Attendance Analytics
    </div>

    <div class="card" onclick="go('admin-gps.html')">
      📍 GPS Map
    </div>

    <div class="card" onclick="go('admin-controls.html')">
      ⚙ Admin Controls
    </div>

    <div class="card" onclick="go('admin-live.html')">
      📡 Live Classes
    </div>

  </div>

</div>

<script>
const name = localStorage.getItem("name") || "Admin";
const hr = new Date().getHours();
const greet = hr<12?"Good Morning":hr<18?"Good Afternoon":"Good Evening";
document.getElementById("greet").innerText =
`${greet}, ${name} 👋`;

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
