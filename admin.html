<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO GREEN – Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  font-family:Arial;
  padding:20px;
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
}
h2{color:#2e7d32}
section{margin-bottom:30px}
button{
  background:#2e7d32;
  color:#fff;
  border:none;
  padding:8px;
  margin:4px;
  cursor:pointer;
}
input,select{padding:8px;margin:4px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:6px}
#welcomeBar{
  background:#ffffffaa;
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
}
#map{height:320px;border-radius:10px}
.card{
 background:white;
 padding:15px;
 border-radius:10px;
 margin-top:15px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1)
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="admin"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<h2>🌱 GO GREEN – Admin Super Dashboard</h2>
<div id="welcomeBar"></div>
<button onclick="logout()">Logout</button>

<!-- ================= ADMIN SUPER CONTROLS ================= -->
<section class="card">
<h3>👑 Admin Super Controls</h3>

<input id="userEmail" placeholder="User Email">
<select id="userType">
<option value="Employees">Employee</option>
<option value="Students">Student</option>
</select>

<select id="activeSel">
<option value="true">Active</option>
<option value="false">Inactive</option>
</select>

<button onclick="updateUser()">Update Status</button>
<button onclick="forceLogout()">Force Logout</button>
</section>

<!-- ================= LIVE CLASSES ================= -->
<section class="card">
<h3>📡 Live Running Classes</h3>
<button onclick="loadLiveClasses()">Refresh</button>
<table>
<thead>
<tr>
<th>Session</th>
<th>Subject</th>
<th>Faculty</th>
<th>Room</th>
</tr>
</thead>
<tbody id="liveBody"></tbody>
</table>
</section>

<!-- ================= ANALYTICS ================= -->
<section class="card">
<h3>📊 Overall Attendance Analytics</h3>
<div id="chartDiv" style="height:300px"></div>
</section>

<!-- ================= GPS MAP ================= -->
<section class="card">
<h3>🗺 Live GPS Map</h3>
<button onclick="refreshMap()">Refresh Map</button>
<div id="map"></div>
</section>

<!-- ================= MARKS APPROVAL SHORTCUT ================= -->
<section class="card">
<h3>📘 HOD Marks Approval</h3>
<button onclick="window.open('hod-marks.html','_blank')">
Open Marks Approval Panel
</button>
</section>

<!-- ================= FACULTY ================= -->
<section class="card">
<h3>Faculty Panel</h3>
<table>
<thead><tr><th>Name</th><th>Email</th><th>Status</th></tr></thead>
<tbody id="facultyBody"></tbody>
</table>
</section>

<!-- ================= STUDENTS ================= -->
<section class="card">
<h3>Student Panel</h3>
<table>
<thead><tr><th>Roll</th><th>Name</th><th>Email</th></tr></thead>
<tbody id="studentBody"></tbody>
</table>
</section>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const email=localStorage.getItem("email");

function post(d){
 return fetch(API_URL,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify(d)
 }).then(r=>r.json());
}

function logout(){
 localStorage.clear();
 location.href="index.html";
}

/* ===== GREETING ===== */
const name=localStorage.getItem("name")||"Admin";
const hr=new Date().getHours();
const greet=hr<12?"Good Morning":hr<18?"Good Afternoon":"Good Evening";
welcomeBar.innerHTML=`${greet}, ${name} 👋`;

/* ===== ADMIN CONTROLS ===== */
function updateUser(){
 post({
  action:"toggleUserStatus",
  email:userEmail.value,
  type:userType.value,
  active:activeSel.value==="true"
 }).then(()=>alert("User status updated"));
}

function forceLogout(){
 post({
  action:"forceLogout",
  email:userEmail.value
 }).then(()=>alert("User forced logout"));
}

/* ===== LIVE CLASSES ===== */
function loadLiveClasses(){
 post({action:"getLiveClasses"})
 .then(r=>{
  liveBody.innerHTML="";
  if(!r.data) return;
  r.data.forEach(c=>{
   liveBody.innerHTML+=`
   <tr>
    <td>${c.sessionId}</td>
    <td>${c.subject}</td>
    <td>${c.faculty}</td>
    <td>${c.room}</td>
   </tr>`;
  });
 });
}
loadLiveClasses();
setInterval(loadLiveClasses,20000);

/* ===== ANALYTICS ===== */
google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadChart);

function loadChart(){
 post({action:"getAnalytics"}).then(r=>{
  const data=google.visualization.arrayToDataTable([
   ["Type","Count"],
   ["Present",r.present],
   ["Total",r.total]
  ]);
  new google.visualization.PieChart(chartDiv)
    .draw(data,{title:"Overall Attendance"});
 });
}

/* ===== MAP ===== */
let map=L.map('map').setView([28.47,77.48],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function refreshMap(){
 post({action:"getGpsPoints"}).then(r=>{
  r.data.forEach(p=>{
   if(p.lat){
    L.marker([Number(p.lat),Number(p.lng)])
     .addTo(map)
     .bindPopup(p.email);
   }
  });
 });
}
refreshMap();

/* ===== FACULTY ===== */
post({action:"getFaculty"}).then(r=>{
 r.data.forEach(x=>{
  facultyBody.innerHTML+=`
  <tr>
   <td>${x[2]}</td>
   <td>${x[1]}</td>
   <td>${x[3]}</td>
  </tr>`;
 });
});

/* ===== STUDENTS ===== */
post({action:"getStudents"}).then(r=>{
 r.data.forEach(x=>{
  studentBody.innerHTML+=`
  <tr>
   <td>${x[0]}</td>
   <td>${x[1]}</td>
   <td>${x[2]}</td>
  </tr>`;
 });
});

/* ===== AUTO FORCE LOGOUT CHECK ===== */
setInterval(()=>{
 post({action:"checkForceLogout",email})
 .then(r=>{
  if(r.logout){
   alert("You have been logged out by Admin");
   logout();
  }
 });
},5000);

</script>

</body>
</html>
