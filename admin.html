<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:40px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  text-align:center;
  font-weight:bold;
}

.card:hover{
  background:#c8e6c9;
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="admin"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 GO GREEN – Admin Dashboard</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="card" onclick="go('admin-my-attendance.html')">
    📌 My Attendance
  </div>

  <div class="card" onclick="go('admin-analytics.html')">
    📊 Overall Analytics
  </div>

  <div class="card" onclick="go('admin-users.html')">
    👥 Faculty & Students
  </div>

  <div class="card" onclick="go('admin-gps.html')">
    📍 Live GPS Map
  </div>

  <div class="card" onclick="go('admin-live.html')">
    📡 Live Classes
  </div>

  <div class="card" onclick="go('admin-controls.html')">
    ⚙ Super Controls
  </div>

  <div class="card" onclick="go('admin-warning.html')">
    🚨 Early Warning
  </div>

</div>

<script>
function logout(){
  localStorage.clear();
  location.href="index.html";
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
