<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live GPS Map</title>
<style>
#map{height:500px;width:100%}
</style>
</head>
<body>

<h2>📍 Live Staff Location</h2>
<div id="map"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function initMap(){

const map = L.map('map').setView([28.47,77.48],15);

L.tileLayer(
 "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

post({action:"getGpsPoints"}).then(r=>{
  (r.data||[]).forEach(p=>{
    if(p.lat && p.lng){
      L.marker([Number(p.lat),Number(p.lng)])
      .addTo(map)
      .bindPopup(p.email);
    }
  });
});

 fetch(API,{
  method:"POST",
  headers:{"Content-Type":"text/plain"},
  body:JSON.stringify({action:"getGpsPoints"})
 })
 .then(r=>r.json())
 .then(data=>{
  data.data.forEach(p=>{
    new google.maps.Marker({
      position:{lat:Number(p.lat),lng:Number(p.lng)},
      map:map,
      title:p.email
    });
  });
 });

}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY&callback=initMap">
</script>

</body>
</html>
