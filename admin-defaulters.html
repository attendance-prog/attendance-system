<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Fee Defaulters</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.header{
background:#1b5e20;
color:white;
padding:15px;
font-size:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">
🚨 Fee Defaulters
</div>

<table>

<thead>
<tr>
<th>Student</th>
<th>Semester</th>
<th>Pending</th>
<th>Due Date</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"getDefaulters"
})

})
.then(r=>r.json())
.then(res=>{

const tbody=document.getElementById("data");

res.data.forEach(d=>{

tbody.innerHTML+=`
<tr>
<td>${d[0]}</td>
<td>${d[1]}</td>
<td>${d[4]}</td>
<td>${d[5]}</td>
</tr>
`;

})

})

</script>

</body>
</html>
