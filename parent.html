<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Parent Portal</title>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.header{
background:#1b5e20;
color:white;
padding:15px;
font-size:20px;
}

.section{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="header">
👨‍👩‍👧 Parent Dashboard
</div>

<div class="section">

<div class="card">
<h3 id="studentName"></h3>
</div>

<div class="card">
<h3>Attendance</h3>
<p id="attendance"></p>
</div>

<div class="card">
<h3>Marks</h3>
<p id="marks"></p>
</div>

<div class="card">
<h3>Fee Status</h3>
<p id="fees"></p>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

const email=localStorage.getItem("email");

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"getParentDashboard",
email:email
})

})
.then(r=>r.json())
.then(res=>{

document.getElementById("studentName").innerText="Student: "+res.student;

document.getElementById("attendance").innerText=res.attendance.length+" classes";

document.getElementById("marks").innerText=res.marks.length+" subjects";

document.getElementById("fees").innerText=res.fees.length+" fee records";

});

</script>

</body>
</html>
