<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – My Fee Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.header{
background:#1b5e20;
color:white;
padding:15px;
font-size:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#2e7d32;
color:white;
}
</style>
</head>

<body>

<div class="header">
💰 My Fee Status
</div>

<table>

<thead>
<tr>
<th>Semester</th>
<th>Total</th>
<th>Paid</th>
<th>Pending</th>
<th>Status</th>
</tr>
</thead>

<tbody id="fee"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

const studentId=localStorage.getItem("studentId");

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({

action:"getFeeStatus",
studentId:studentId

})

})
.then(r=>r.json())
.then(res=>{

const tbody=document.getElementById("fee");

res.data.forEach(r=>{

tbody.innerHTML+=`
<tr>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[6]}</td>
</tr>
`;

})

})

</script>

</body>
</html>
