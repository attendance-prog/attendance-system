<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coordinator – Attendance Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}
.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:30px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
  margin-bottom:15px;
}
#map{
  height:400px;
  border-radius:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="coordinator"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 Coordinator – Attendance Map</div>
  <div>
    <button onclick="goBack()">⬅ Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">

    <h3>🗺 Live Attendance GPS Map</h3>

    <button onclick="loadMapData()">Refresh Map</button>

    <div id="map"></div>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}
function goBack(){
  window.location.href="coordinator.html";
}

/* Initialize map */
const map = L.map('map').setView([28.47,77.48],10);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom:18 }
).addTo(map);

let markers=[];

function loadMapData(){

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  post({action:"getGpsPoints"})
  .then(r=>{
    if(!r.success) return;

    (r.data||[]).forEach(p=>{
      if(p.lat && p.lng){
        const marker = L.marker([
          Number(p.lat),
          Number(p.lng)
        ]).addTo(map)
        .bindPopup(p.email);

        markers.push(marker);
      }
    });
  });
}

loadMapData();
</script>

</body>
</html>
