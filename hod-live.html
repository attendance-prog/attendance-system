<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HOD – Live Classes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:left;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="hod"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 HOD – Live Running Classes</div>
  <div>
    <button onclick="goBack()">⬅ Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h3>📡 Active Sessions</h3>

    <button onclick="loadLiveClasses()">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>Session ID</th>
          <th>Subject</th>
          <th>Faculty</th>
          <th>Room</th>
        </tr>
      </thead>
      <tbody id="liveBody"></tbody>
    </table>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function goBack(){
  window.location.href="hod.html";
}

/* Load Live Classes */
function loadLiveClasses(){
  post({action:"getLiveClasses"}).then(r=>{
    const body=document.getElementById("liveBody");
    body.innerHTML="";

    (r.data||[]).forEach(c=>{
      body.innerHTML+=`
      <tr>
        <td>${c.sessionId}</td>
        <td>${c.subject}</td>
        <td>${c.faculty}</td>
        <td>${c.room}</td>
      </tr>`;
    });
  });
}

/* Auto Refresh */
loadLiveClasses();
setInterval(loadLiveClasses,20000);
</script>

</body>
</html>
