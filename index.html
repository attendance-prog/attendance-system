<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GO GREEN Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  background: #eaf6ea;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: #fff;
  padding: 25px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  text-align: center;
}
h2 { color: #2e7d32; }
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  background: #2e7d32;
  color: #fff;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>🌱 GO GREEN</h2>

  <input type="email" id="email" placeholder="Enter Email ID">

  <select id="role">
    <option value="">Select Role</option>
    <option value="admin">Admin</option>
    <option value="hod">HOD</option>
    <option value="faculty">Faculty</option>
    <option value="coordinator">Coordinator</option>
    <option value="student">Student</option>
  </select>

  <button onclick="sendOTP()">Send OTP</button>

  <input type="number" id="otp" placeholder="Enter OTP">

  <button onclick="verifyOtp()">Verify OTP</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function sendOTP() {
  const email = document.getElementById("email").value.trim();
  const role = document.getElementById("role").value;

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({
      action:"sendOTP",
      email: email,
      role: role
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    if (data.success) {
      localStorage.setItem("email", email);
      localStorage.setItem("role", role);
    }
  });
}

function verifyOtp() {
  const email = localStorage.getItem("email");
  const role = localStorage.getItem("role");
  const otp = document.getElementById("otp").value.trim();

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify({
      action:"verifyOTP",
      email: email,
      otp: otp
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {

      if (role === "admin") window.location.href = "/attendance-system/admin.html";
else if (role === "hod") window.location.href = "/attendance-system/hod.html";
else if (role === "coordinator") window.location.href = "/attendance-system/coordinator.html";
else if (role === "faculty") window.location.href = "/attendance-system/faculty.html";
else if (role === "student") window.location.href = "/attendance-system/student.html";

    } else {
      alert(data.message);
    }
  });
}
</script>

</body>
</html>
