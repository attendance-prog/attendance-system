<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Attendance Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
}

.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
  color:#1b5e20;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:10px;
}

.day{
  padding:12px 0;
  text-align:center;
  border-radius:10px;
  font-size:14px;
  font-weight:bold;
}

.present{ background:#4caf50; color:white; }
.absent{ background:#f44336; color:white; }
.late{ background:#ff9800; color:white; }
.default{ background:#e0e0e0; }

.legend{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  font-size:12px;
}

.fab{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  background:#2e7d32;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#555;
}

.bottom-nav .active{
  color:#2e7d32;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  📅 Attendance Calendar
</div>

<div class="card">
  <div class="calendar" id="calendar"></div>

  <div class="legend">
    <span>🟢 Present</span>
    <span>🟡 Late</span>
    <span>🔴 Absent</span>
  </div>
</div>

<div class="fab" onclick="goQR()">📷</div>

<div class="bottom-nav">
  <div onclick="go('student.html')">🏠<br>Home</div>
  <div onclick="go('student-attendance.html')">📊<br>Attendance</div>
  <div onclick="go('student-marks.html')">📘<br>Marks</div>
  <div class="active">📅<br>Calendar</div>
  <div onclick="go('student-profile.html')">👤<br>Profile</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const email=localStorage.getItem("email");

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify({
    action:"getMyFullAttendance",
    email:email
  })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    buildCalendar(res.data);
  }
});

function buildCalendar(data){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const today=new Date();
  const year=today.getFullYear();
  const month=today.getMonth();
  const days=new Date(year,month+1,0).getDate();

  for(let d=1; d<=days; d++){
    const dateStr=new Date(year,month,d).toDateString();
    const record=data.find(r=>new Date(r.date).toDateString()===dateStr);

    let cls="default";
    if(record){
      if(record.status==="Present") cls="present";
      if(record.status==="Late") cls="late";
      if(record.status==="Absent") cls="absent";
    }

    cal.innerHTML+=`<div class="day ${cls}">${d}</div>`;
  }
}

function go(p){window.location.href=p}
function goQR(){window.location.href="student-qr.html"}
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
  .then(()=>console.log("Service Worker Registered"));
}
</script>
</body>
</html>
