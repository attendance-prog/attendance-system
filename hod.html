<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – HOD Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
 font-family:Arial;
 padding:20px;
 background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
}
h2{color:#2e7d32}
button{background:#2e7d32;color:#fff;border:none;padding:8px;margin:4px}
input,select{padding:6px;margin:4px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:6px}

#welcomeBar{
 background:#1b5e20;
 color:white;
 padding:12px;
 border-radius:8px;
 margin-bottom:15px;
}

#toast{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#1b5e20;
 color:white;
 padding:10px 16px;
 border-radius:6px;
 display:none;
}
.section{
 background:white;
 padding:15px;
 margin-top:20px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="hod"){
 alert("Unauthorized");
 location.href="index.html";
}
</script>

<div id="welcomeBar"></div>
<h2>🌱 GO GREEN – HOD Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="section">
<h3>📘 Marks Approval Panel</h3>
<button onclick="loadMarks()">Load Draft Marks</button>
<table>
<thead>
<tr>
<th>Date</th>
<th>Faculty</th>
<th>Student</th>
<th>CA</th>
<th>End</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="marksBody"></tbody>
</table>
</div>

<div class="section">
<h3>📊 Department Attendance Overview</h3>
<div id="deptChart" style="height:300px"></div>
</div>

<div class="section">
<h3>🚨 Early Warning Monitor</h3>
<button onclick="runWarnings()">Run Warning Check</button>
</div>

<div class="section">
<h3>📡 Live Running Classes</h3>
<button onclick="loadLiveClasses()">Refresh</button>
<table>
<thead>
<tr>
<th>Session</th>
<th>Subject</th>
<th>Faculty</th>
<th>Room</th>
</tr>
</thead>
<tbody id="liveBody"></tbody>
</table>
</div>

<div id="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const email=localStorage.getItem("email");

function post(d){
 return fetch(API,{
  method:"POST",
  headers:{"Content-Type":"text/plain"},
  body:JSON.stringify(d)
 }).then(r=>r.json());
}

function toast(m){
 const t=document.getElementById("toast");
 t.innerText=m;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2500);
}

function logout(){
 localStorage.clear();
 location.href="index.html";
}

/* ===== Greeting ===== */
const name=localStorage.getItem("name")||email.split("@")[0];
const hr=new Date().getHours();
const g=hr<12?"Good Morning":hr<18?"Good Afternoon":"Good Evening";
welcomeBar.innerHTML=`${g}, ${name} 👋 | Role: HOD`;

/* ================= MARKS ================= */

function loadMarks(){
 post({action:"getAllMarks"}).then(r=>{
  marksBody.innerHTML="";
  (r.data||[]).forEach(m=>{
   marksBody.innerHTML+=`
   <tr>
    <td>${new Date(m.date).toLocaleDateString()}</td>
    <td>${m.faculty}</td>
    <td>${m.student}</td>
    <td>${m.ca}</td>
    <td>${m.end}</td>
    <td>${m.total}</td>
    <td>${m.status}</td>
    <td>
     ${m.status==="DRAFT"
      ? `<button onclick="approveMarks('${m.student}')">Approve</button>`
      : "Locked"}
    </td>
   </tr>`;
  });
 });
}

function approveMarks(student){
 post({
  action:"lockMarks",
  studentEmail:student
 }).then(()=>{
  toast("Marks Approved & Locked");
  loadMarks();
 });
}

/* ================= LIVE CLASSES ================= */

function loadLiveClasses(){
 post({action:"getLiveClasses"}).then(r=>{
  liveBody.innerHTML="";
  (r.data||[]).forEach(c=>{
   liveBody.innerHTML+=`
   <tr>
    <td>${c.sessionId}</td>
    <td>${c.subject}</td>
    <td>${c.faculty}</td>
    <td>${c.room}</td>
   </tr>`;
  });
 });
}
loadLiveClasses();
setInterval(loadLiveClasses,20000);

/* ================= WARNING ================= */

function runWarnings(){
 post({action:"runEarlyWarningCheck"})
 .then(()=>toast("Warning check completed"));
}

/* ================= DEPARTMENT ANALYTICS ================= */

google.charts.load('current',{packages:['corechart']});
google.charts.setOnLoadCallback(loadDeptChart);

function loadDeptChart(){
 post({action:"getAnalytics"}).then(r=>{
  const data=google.visualization.arrayToDataTable([
   ["Type","Count"],
   ["Present",r.present],
   ["Total",r.total]
  ]);
  new google.visualization.PieChart(deptChart)
   .draw(data,{title:"Department Attendance"});
 });
}

/* ================= FORCE LOGOUT CHECK ================= */

setInterval(()=>{
 post({action:"checkForceLogout",email})
 .then(r=>{
  if(r.logout){
   alert("You have been logged out by Admin");
   logout();
  }
 });
},5000);

</script>

</body>
</html>
