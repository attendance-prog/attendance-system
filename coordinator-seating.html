<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Exam Seating Plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7f6;
}

.header{
background:#1b5e20;
color:white;
padding:18px;
font-size:20px;
}

.container{
padding:25px;
}

input,textarea,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<div class="header">
🪑 Exam Seating Plan
</div>

<div class="container">

<label>Exam Date</label>
<input type="date" id="date">

<label>Rooms (comma separated)</label>
<input id="rooms" placeholder="Room101,Room102">

<label>Seats Per Room</label>
<input id="seats" type="number">

<button onclick="generate()">Generate Seating Plan</button>

<table>

<thead>
<tr>
<th>Date</th>
<th>Room</th>
<th>Seat</th>
<th>Student ID</th>
<th>Email</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function generate(){

const rooms=document.getElementById("rooms").value.split(",");

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({

action:"generateSeatingPlan",
date:document.getElementById("date").value,
rooms:rooms,
seats:document.getElementById("seats").value

})

})
.then(r=>r.json())
.then(res=>{
alert(res.message);
load();
});

}

function load(){

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"getSeatingPlan",
date:document.getElementById("date").value
})

})
.then(r=>r.json())
.then(res=>{

const body=document.getElementById("data");

body.innerHTML="";

res.data.forEach(r=>{

body.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
</tr>
`;

});

});

}

</script>

</body>
</html>
