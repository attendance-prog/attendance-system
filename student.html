<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Student App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
  overflow-x:hidden;
}

/* Header */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
  color:#1b5e20;
}

/* Card */
.card{
  background:rgba(255,255,255,0.9);
  margin:15px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  backdrop-filter:blur(10px);
  animation:fadeIn .6s ease-in-out;
}

/* Attendance Circle */
.progress-container{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:15px;
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:conic-gradient(#2e7d32 0%, #c8e6c9 0%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
  color:#1b5e20;
}

/* Floating Button */
.fab{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  background:#2e7d32;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}

/* Bottom Nav */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#555;
  cursor:pointer;
}

.bottom-nav .active{
  color:#2e7d32;
  font-weight:bold;
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="student"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  Welcome, <span id="studentName"></span>
</div>

<div class="card">
  <h3>Attendance Overview</h3>
  <div class="progress-container">
    <div class="circle" id="attendanceCircle">0%</div>
  </div>
</div>

<div class="card">
  <h3>Today's Status</h3>
  <p id="todayStatus">Checking...</p>
</div>

<!-- Floating Scan -->
<div class="fab" onclick="goQR()">📷</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="active" onclick="go('student.html')">🏠<br>Home</div>
  <div onclick="go('student-attendance.html')">📊<br>Attendance</div>
  <div onclick="go('student-marks.html')">📘<br>Marks</div>
  <div onclick="go('student-timetable.html')">📅<br>Timetable</div>
  <div onclick="go('student-profile.html')">👤<br>Profile</div>
  <div onclick="go('student-fee.html')">
💰<br>Fees
</div>
  <div class="card" onclick="go('student-complaint.html')">
🚨 Complaint
</div>
  <div class="card" onclick="go('admin-notice.html')">
📢 Post Notice
</div>
  <div class="card" onclick="go('student-documents.html')">
📂 Documents
</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const email=localStorage.getItem("email");

document.getElementById("studentName").innerText=
localStorage.getItem("name");
fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"checkParentInfo",
email:localStorage.getItem("email")
})

})
.then(r=>r.json())
.then(res=>{

if(!res.complete){

window.location.href="student-parent.html";

}

});
/* Load Attendance */
fetch(API,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify({
    action:"getMyAttendanceAnalytics",
    email:email
  })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    animateCircle(res.percent);
  }
});

/* Animate Circle */
function animateCircle(percent){
  const circle=document.getElementById("attendanceCircle");
  let start=0;
  const interval=setInterval(()=>{
    if(start>=percent){
      clearInterval(interval);
    }else{
      start++;
      circle.innerText=start+"%";
      circle.style.background=
      `conic-gradient(#2e7d32 ${start}%, #c8e6c9 ${start}%)`;
    }
  },15);
}

/* Today's Status */
fetch(API,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify({
    action:"getTodayAttendance",
    email:email
  })
})
.then(r=>r.json())
.then(res=>{
  document.getElementById("todayStatus").innerText=
  res.status || "Not Marked";
});

function go(p){window.location.href=p}
function goQR(){window.location.href="student-qr.html"}
</script>
</body>
</html>
