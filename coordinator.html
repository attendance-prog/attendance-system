<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Coordinator Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= ROOT THEME ================= */

:root{
  --primary:#4a148c;
  --hover:#6a1b9a;
  --bg:#f4f7f6;
  --card:#ffffff;
  --text:#222;
}

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  transition:0.3s;
}

/* ================= SIDEBAR ================= */

.sidebar{
  width:230px;
  background:var(--primary);
  color:#fff;
  height:100vh;
  position:fixed;
  padding:20px 0;
  transition:.3s;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:12px 20px;
  transition:.3s;
}

.sidebar a:hover{
  background:var(--hover);
}

.sidebar.collapsed{
  width:70px;
}

.sidebar.collapsed a span{
  display:none;
}

.nav-link.active{
  background:var(--hover);
}

/* ================= MAIN ================= */

.main{
  margin-left:230px;
  width:100%;
  transition:.3s;
  animation:fadeIn .4s;
}

.main.expanded{
  margin-left:70px;
}

/* ================= HEADER ================= */

.header{
  background:linear-gradient(135deg,var(--primary),var(--hover));
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.menu-btn{
  background:none;
  border:none;
  font-size:22px;
  color:white;
  cursor:pointer;
}

.header-buttons button{
  margin-left:10px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.dark-btn{
  background:white;
  color:black;
}

.logout-btn{
  background:black;
  color:white;
}

/* ================= CONTENT ================= */

.content{
  padding:30px;
}

.grid{
  display:grid;
  gap:20px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  cursor:pointer;
  text-align:center;
  font-weight:bold;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ================= DARK MODE ================= */

body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
}

/* ================= ANIMATION ================= */

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="coordinator"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar">
  <h2>🌱 GO GREEN</h2>
  <a href="coordinator.html" class="nav-link">🏠 <span>Dashboard</span></a>
  <a href="coordinator-attendance.html" class="nav-link">📊 <span>My Attendance</span></a>
  <a href="coordinator-timetable.html" class="nav-link">📅 <span>Faculty Timetable</span></a>
  <a href="coordinator-faculty.html" class="nav-link">👨‍🏫 <span>Faculty Attendance</span></a>
  <a href="coordinator-leaves.html" class="nav-link">📝 <span>Leave Approval</span></a>
  <a href="coordinator-substitute.html" class="nav-link">🤖 <span>Substitute Suggestion</span></a>
  <a href="coordinator-map.html" class="nav-link">🗺 <span>Attendance Map</span></a>
</div>

<!-- ================= MAIN ================= -->

<div class="main">

  <div class="header">
    <div>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <strong>Coordinator Dashboard</strong>
    </div>

    <div class="header-buttons">
      <button class="dark-btn" onclick="toggleDark()">🌙</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">
    <div class="grid">

      <div class="card" onclick="go('coordinator-attendance.html')">📊 My Attendance</div>
      <div class="card" onclick="go('coordinator-timetable.html')">📅 Faculty Timetable</div>
      <div class="card" onclick="go('coordinator-faculty.html')">👨‍🏫 Faculty Attendance</div>
      <div class="card" onclick="go('coordinator-leaves.html')">📝 Faculty Leave Approval</div>
      <div class="card" onclick="go('coordinator-substitute.html')">🤖 Substitute Suggestions</div>
      <div class="card" onclick="go('coordinator-map.html')">🗺 Attendance Map</div>

    </div>
  </div>
</div>

<script>

/* ===== Sidebar Toggle ===== */
function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("collapsed");
  document.querySelector(".main").classList.toggle("expanded");
}

/* ===== Dark Mode ===== */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* ===== Logout ===== */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* ===== Navigation ===== */
function go(p){
  window.location.href=p;
}

/* ===== Active Link Highlight ===== */
document.querySelectorAll(".nav-link").forEach(l=>{
  if(l.href===window.location.href){
    l.classList.add("active");
  }
});

</script>

</body>
</html>
