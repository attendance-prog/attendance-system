<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coordinator Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  text-align:center;
  font-weight:bold;
}

.card:hover{
  background:#c8e6c9;
}
button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="coordinator"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 GO GREEN – Coordinator Dashboard</div>
  <div>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <div class="grid">

    <div class="card" onclick="go('coordinator-attendance.html')">
      📊 My Attendance
    </div>

    <div class="card" onclick="go('coordinator-timetable.html')">
      📅 Faculty Timetable
    </div>

    <div class="card" onclick="go('coordinator-faculty.html')">
      👨‍🏫 Faculty Attendance
    </div>

    <div class="card" onclick="go('coordinator-leaves.html')">
      📝 Faculty Leave Approval
    </div>

    <div class="card" onclick="go('coordinator-substitute.html')">
      🤖 Substitute Suggestions
    </div>

    <div class="card" onclick="go('coordinator-map.html')">
      🗺 Attendance Map
    </div>

  </div>

</div>

<script>
function go(page){
  window.location.href=page;
}
function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
