<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
  transition:0.3s;
}

/* Dark Mode */
body.dark{
  background:linear-gradient(135deg,#1b1b1b,#2c2c2c);
  color:white;
}

body.dark .card{
  background:#2e2e2e;
  color:white;
}

body.dark .bottom-nav{
  background:#1e1e1e;
}

body.dark .bottom-nav div{
  color:#bbb;
}

body.dark .bottom-nav .active{
  color:#4caf50;
}

/* Header */
.header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
  color:#1b5e20;
}

body.dark .header{
  color:#4caf50;
}

/* Card */
.card{
  background:rgba(255,255,255,0.9);
  margin:15px;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  backdrop-filter:blur(10px);
  animation:fadeIn .6s ease-in-out;
}

/* Button */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

/* Toggle */
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:15px;
}

/* Floating Button */
.fab{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  background:#2e7d32;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}

/* Bottom Nav */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#555;
  cursor:pointer;
}

.bottom-nav .active{
  color:#2e7d32;
  font-weight:bold;
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="student"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  👤 My Profile
</div>

<div class="card">
  <h3 id="studentName"></h3>
  <p id="studentEmail"></p>

  <div class="toggle">
    <span>🌙 Dark Mode</span>
    <input type="checkbox" id="darkToggle">
  </div>

  <button class="btn" onclick="logout()">Logout</button>
</div>

<div class="card">
  <h4>About App</h4>
  <p>GO GREEN Smart Attendance System</p>
  <p>Version 1.0 – Mobile Edition</p>
</div>

<!-- Floating Scan -->
<div class="fab" onclick="goQR()">📷</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div onclick="go('student.html')">🏠<br>Home</div>
  <div onclick="go('student-attendance.html')">📊<br>Attendance</div>
  <div onclick="go('student-marks.html')">📘<br>Marks</div>
  <div onclick="go('student-timetable.html')">📅<br>Timetable</div>
  <div class="active">👤<br>Profile</div>
</div>

<script>
document.getElementById("studentName").innerText =
  "Name: " + localStorage.getItem("name");

document.getElementById("studentEmail").innerText =
  "Email: " + localStorage.getItem("email");

/* Dark Mode */
const toggle=document.getElementById("darkToggle");

if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark");
  toggle.checked=true;
}

toggle.addEventListener("change",()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode",toggle.checked);
});

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function go(p){window.location.href=p}
function goQR(){window.location.href="student-qr.html"}
</script>

</body>
</html>
