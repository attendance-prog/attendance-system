<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Faculty Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f4f7f6;
  display:flex;
}

/* ===== Sidebar ===== */
.sidebar{
  width:230px;
  background:#1b5e20;
  color:white;
  height:100vh;
  padding:20px 0;
  position:fixed;
  transition:0.3s;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:12px 20px;
  transition:0.3s;
}

.sidebar a:hover{
  background:#2e7d32;
}

.sidebar.collapsed{
  width:70px;
}

.sidebar.collapsed a span{
  display:none;
}

.nav-link.active{
  background:#2e7d32;
}

/* ===== Main Area ===== */
.main{
  margin-left:230px;
  width:100%;
  transition:0.3s;
  animation: fadeIn 0.4s ease-in-out;
}

.main.expanded{
  margin-left:70px;
}

/* ===== Header ===== */
.header{
  background:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.menu-btn{
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
}

.logout-btn{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* ===== Content ===== */
.content{
  padding:30px;
}

.welcome-card{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

/* ===== Stats ===== */
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-card{
  flex:1;
  min-width:220px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:0.3s;
}

.stat-card:hover{
  transform:translateY(-5px);
}

.stat-card h3{
  margin:0;
  color:#1b5e20;
}

.stat-card p{
  font-size:22px;
  margin-top:8px;
  font-weight:bold;
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    display:none;
  }
  .main{
    margin-left:0;
  }
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="faculty"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
  <h2>🌱 GO GREEN</h2>

  <a href="faculty.html" class="nav-link">🏠 <span>Dashboard</span></a>
  <a href="faculty-attendance.html" class="nav-link">📊 <span>My Attendance</span></a>
  <a href="faculty-qr.html" class="nav-link">📷 <span>Generate QR</span></a>
  <a href="faculty-timetable.html" class="nav-link">📅 <span>My Timetable</span></a>
  <a href="faculty-leave.html" class="nav-link">📝 <span>Apply Leave</span></a>
  <a href="faculty-students.html" class="nav-link">🎓 <span>My Class Students</span></a>
  <a href="faculty-marks.html" class="nav-link">📘 <span>Permanent List & Marks</span></a>
  <a href="faculty-questionbank.html" class="nav-link">📂 <span>Question Bank</span></a>
</div>

<!-- ===== Main ===== -->
<div class="main">

  <div class="header">
    <div style="display:flex;align-items:center;gap:15px;">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <strong>Faculty Dashboard</strong>
      <span id="liveIndicator" style="margin-left:10px;"></span>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <div class="welcome-card">
      <h2 id="welcomeName">Welcome</h2>
      <p id="facultyEmail"></p>
    </div>

    <div class="stats">

      <div class="stat-card">
        <h3>Attendance %</h3>
        <p id="attendancePercent">0</p>
      </div>

      <div class="stat-card">
        <h3>Live Classes</h3>
        <p id="liveClasses">0</p>
      </div>

    </div>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

/* Logout */
function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* Sidebar Toggle */
function toggleSidebar(){
  document.querySelector(".sidebar").classList.toggle("collapsed");
  document.querySelector(".main").classList.toggle("expanded");
}

/* Active Link Highlight */
document.querySelectorAll(".nav-link").forEach(link=>{
  if(link.href === window.location.href){
    link.classList.add("active");
  }
});

/* Welcome Info */
document.getElementById("welcomeName").innerText =
  "Welcome, " + localStorage.getItem("name");

document.getElementById("facultyEmail").innerText =
  localStorage.getItem("email");

/* Animated Counter */
function animateCounter(id, endValue){
  let start=0;
  const duration=800;
  const increment=endValue/(duration/20);

  const counter=setInterval(()=>{
    start+=increment;
    if(start>=endValue){
      start=endValue;
      clearInterval(counter);
    }
    document.getElementById(id).innerText=Math.floor(start);
  },20);
}

/* Load Attendance % */
fetch(API_URL,{
  method:"POST",
  headers:{ "Content-Type":"text/plain;charset=utf-8" },
  body:JSON.stringify({
    action:"getMyAttendanceAnalytics",
    email: localStorage.getItem("email")
  })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    animateCounter("attendancePercent", res.percent);
  }
});

/* Load Live Classes */
fetch(API_URL,{
  method:"POST",
  headers:{ "Content-Type":"text/plain;charset=utf-8" },
  body:JSON.stringify({ action:"getLiveClasses" })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    animateCounter("liveClasses", res.data.length);
  }
});

/* Live Status Indicator */
function checkLiveStatus(){
  fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify({ action:"getCurrentSlot" })
  })
  .then(r=>r.json())
  .then(res=>{
    const indicator=document.getElementById("liveIndicator");
    if(res.success && res.data){
      indicator.innerHTML="🟢 Live Class";
      indicator.style.color="green";
    }else{
      indicator.innerHTML="🔴 No Active Class";
      indicator.style.color="red";
    }
  });
}

checkLiveStatus();
setInterval(checkLiveStatus,30000);
</script>

</body>
</html>
