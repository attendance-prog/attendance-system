<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

.card:hover{
  background:#c8e6c9;
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
@media(max-width:1000px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="faculty"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 GO GREEN – Faculty Dashboard</div>
  <div>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <div class="grid">

    <!-- Row 1 -->
    <div class="card" onclick="go('faculty-attendance.html')">
      📊 My Attendance
    </div>

    <div class="card" onclick="go('faculty-qr.html')">
      📷 Generate QR Session
    </div>

    <div class="card" onclick="go('faculty-timetable.html')">
      📅 My Timetable
    </div>

    <div class="card" onclick="go('faculty-leave.html')">
      📝 Apply Leave
    </div>

    <!-- Row 2 -->
    <div class="card" onclick="go('faculty-students.html')">
      👨‍🎓 My Class Students
    </div>

    <div class="card" onclick="go('faculty-marks.html')">
      📘 Permanent List & Marks
    </div>

    <div class="card" onclick="go('faculty-questionbank.html')">
      📄 Question Bank Upload
    </div>

    <div class="card">
      🚀 Coming Soon
    </div>

  </div>

</div>

<script>
function go(page){
  window.location.href=page;
}
function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
