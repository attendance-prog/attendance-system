<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GO GREEN – Faculty Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#f4f7f6;
  display:flex;
}

/* ===== Sidebar ===== */
.sidebar{
  width:230px;
  background:#1b5e20;
  color:white;
  height:100vh;
  padding:20px 0;
  position:fixed;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:12px 20px;
  transition:0.3s;
}

.sidebar a:hover{
  background:#2e7d32;
}

/* ===== Main Area ===== */
.main{
  margin-left:230px;
  width:100%;
}

/* ===== Header ===== */
.header{
  background:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.logout-btn{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* ===== Content ===== */
.content{
  padding:30px;
}

.welcome-card{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

/* ===== Stats ===== */
.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-card{
  flex:1;
  min-width:220px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:0.3s;
}

.stat-card:hover{
  transform:translateY(-5px);
}

.stat-card h3{
  margin:0;
  color:#1b5e20;
}

.stat-card p{
  font-size:20px;
  margin-top:8px;
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    display:none;
  }
  .main{
    margin-left:0;
  }
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="faculty"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
  <h2>🌱 GO GREEN</h2>

  <a href="faculty.html">🏠 Dashboard</a>
  <a href="faculty-attendance.html">📊 My Attendance</a>
  <a href="faculty-qr.html">📷 Generate QR</a>
  <a href="faculty-timetable.html">📅 My Timetable</a>
  <a href="faculty-leave.html">📝 Apply Leave</a>
  <a href="faculty-students.html">🎓 My Class Students</a>
  <a href="faculty-marks.html">📘 Permanent List & Marks</a>
  <a href="faculty-questionbank.html">📂 Question Bank</a>
</div>

<!-- ===== Main ===== -->
<div class="main">

  <div class="header">
    <div>
      <strong>Faculty Dashboard</strong>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="content">

    <!-- Welcome -->
    <div class="welcome-card">
      <h2 id="welcomeName">Welcome</h2>
      <p id="facultyEmail"></p>
    </div>

    <!-- Stats -->
    <div class="stats">

      <div class="stat-card">
        <h3>Today's Status</h3>
        <p id="todayStatus">Loading...</p>
      </div>

      <div class="stat-card">
        <h3>Attendance %</h3>
        <p id="attendancePercent">--</p>
      </div>

      <div class="stat-card">
        <h3>Live Classes</h3>
        <p id="liveClasses">--</p>
      </div>

    </div>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function logout(){
  localStorage.clear();
  location.href="index.html";
}

/* Fill welcome info */
document.getElementById("welcomeName").innerText =
  "Welcome, " + localStorage.getItem("name");

document.getElementById("facultyEmail").innerText =
  localStorage.getItem("email");

/* Load Attendance Analytics */
fetch(API_URL,{
  method:"POST",
  headers:{ "Content-Type":"text/plain;charset=utf-8" },
  body:JSON.stringify({
    action:"getMyAttendanceAnalytics",
    email: localStorage.getItem("email")
  })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    document.getElementById("attendancePercent").innerText =
      res.percent + "%";
  }
});

/* Load Live Classes */
fetch(API_URL,{
  method:"POST",
  headers:{ "Content-Type":"text/plain;charset=utf-8" },
  body:JSON.stringify({
    action:"getLiveClasses"
  })
})
.then(r=>r.json())
.then(res=>{
  if(res.success){
    document.getElementById("liveClasses").innerText =
      res.data.length;
  }
});
</script>

</body>
</html>
