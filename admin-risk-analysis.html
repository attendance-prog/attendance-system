<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Risk Students</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f7f6;
}

.header{
background:#1b5e20;
color:white;
padding:18px;
font-size:20px;
}

.container{
padding:25px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#2e7d32;
color:white;
}

.high{
color:red;
font-weight:bold;
}

.medium{
color:orange;
font-weight:bold;
}

.low{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
🧠 Student Risk Analysis
</div>

<div class="container">

<button onclick="run()">Run Risk Analysis</button>

<table>

<thead>
<tr>
<th>Student</th>
<th>Attendance %</th>
<th>Average Marks</th>
<th>Risk Level</th>
<th>Reason</th>
</tr>
</thead>

<tbody id="data">
<tr><td colspan="5">Loading...</td></tr>
</tbody>

</table>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function run(){

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"runRiskAnalysis"
})

})
.then(r=>r.json())
.then(()=>load());

}

function load(){

fetch(API,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },

body:JSON.stringify({
action:"getRiskStudents"
})

})
.then(r=>r.json())
.then(res=>{

const body=document.getElementById("data");

body.innerHTML="";

res.data.forEach(s=>{

let cls="low";

if(s[3]==="HIGH") cls="high";
if(s[3]==="MEDIUM") cls="medium";

body.innerHTML+=`
<tr>
<td>${s[0]}</td>
<td>${s[1]}%</td>
<td>${s[2]}</td>
<td class="${cls}">${s[3]}</td>
<td>${s[4]}</td>
</tr>
`;

});

});

}

load();

</script>

</body>
</html>
