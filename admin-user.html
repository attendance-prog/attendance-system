<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – Users</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:30px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:25px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:left;
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="admin"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 Admin – Faculty & Students</div>
  <div>
    <button onclick="goBack()">⬅ Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- Faculty Panel -->
  <div class="card">
    <h3>👨‍🏫 Faculty Panel</h3>
    <button onclick="loadFaculty()">Refresh Faculty</button>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="facultyBody"></tbody>
    </table>
  </div>

  <!-- Student Panel -->
  <div class="card">
    <h3>🎓 Student Panel</h3>
    <button onclick="loadStudents()">Refresh Students</button>

    <table>
      <thead>
        <tr>
          <th>System ID</th>
          <th>Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>
  </div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function goBack(){
  window.location.href="admin.html";
}

/* Load Faculty */
function loadFaculty(){
  post({action:"getFaculty"}).then(r=>{
    const body=document.getElementById("facultyBody");
    body.innerHTML="";

    (r.data||[]).forEach(x=>{
      body.innerHTML+=`
      <tr>
        <td>${x[2]}</td>
        <td>${x[1]}</td>
        <td>${x[3]}</td>
      </tr>`;
    });
  });
}

/* Load Students */
function loadStudents(){
  post({action:"getStudents"}).then(r=>{
    const body=document.getElementById("studentBody");
    body.innerHTML="";

    (r.data||[]).forEach(x=>{
      body.innerHTML+=`
      <tr>
        <td>${x[0]}</td>
        <td>${x[2] || x[1]}</td>
        <td>${x[1]}</td>
      </tr>`;
    });
  });
}

/* Auto load on open */
loadFaculty();
loadStudents();
</script>

</body>
</html>
