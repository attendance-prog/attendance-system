<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – Overall Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  padding:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
  <script src="api.js"></script>

<script>
async function loadAnalytics() {
  const data = await callAPI("getResultAnalytics");

  document.getElementById("passCount").innerText = data.pass;
  document.getElementById("failCount").innerText = data.fail;
}

loadAnalytics();
</script>
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="admin"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 Admin – Overall Analytics</div>
  <div>
    <button onclick="goBack()">⬅ Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>📊 Overall Attendance</h3>
    <p>Attendance Percentage: <b id="percentText">--%</b></p>
    <div id="chartDiv" style="height:350px"></div>
  </div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function goBack(){
  window.location.href="admin.html";
}

/* Load Chart */
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(loadChart);

function loadChart(){
  post({action:"getAnalytics"}).then(r=>{

    if(!r.success){
      alert("No data found");
      return;
    }

    document.getElementById("percentText").innerText =
      (r.percent || 0) + "%";

    const data = google.visualization.arrayToDataTable([
      ['Type', 'Count'],
      ['Present', r.present || 0],
      ['Absent', (r.total - r.present) || 0]
    ]);

    const chart = new google.visualization.PieChart(
      document.getElementById('chartDiv')
    );

    chart.draw(data, {
      title: 'Overall Attendance Distribution'
    });
  });
}
</script>

</body>
</html>
