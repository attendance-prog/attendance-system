<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faculty – Question Bank Upload</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}
.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:40px;
}
.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  max-width:600px;
}
input{
  margin-bottom:15px;
}
button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="faculty"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 Faculty – Question Bank Upload</div>
  <div>
    <button onclick="goBack()">⬅ Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">

    <h3>📄 Upload Question Bank (PDF Only)</h3>
    <p>Maximum file size: 10MB</p>

    <input type="file" id="pdfFile" accept="application/pdf">

    <br>
    <button onclick="uploadPDF()">Upload</button>

    <p id="status"></p>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const facultyEmail=localStorage.getItem("email");

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}
function goBack(){
  window.location.href="faculty.html";
}

function uploadPDF(){

  const file=document.getElementById("pdfFile").files[0];

  if(!file){
    alert("Select PDF file");
    return;
  }

  if(file.type!=="application/pdf"){
    alert("Only PDF allowed");
    return;
  }

  if(file.size>10*1024*1024){
    alert("File exceeds 10MB limit");
    return;
  }

  const reader=new FileReader();

  reader.onload=function(){
    const base64=reader.result;

    post({
      action:"uploadQuestionBank",
      facultyEmail,
      fileName:file.name,
      fileData:base64
    }).then(r=>{
      document.getElementById("status").innerText=
        r.message || "Upload Complete";
    });

  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
