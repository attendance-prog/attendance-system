<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Faculty – My Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e8f5e9;
}
.header{
  background:#1b5e20;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  padding:30px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
  font-size:13px;
}
th{
  background:#2e7d32;
  color:white;
}
button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("role")!=="faculty"){
  alert("Unauthorized");
  location.href="index.html";
}
</script>

<div class="header">
  <div>🌱 Faculty – My Timetable</div>
  <div>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">

    <table id="timetable">
     <thead>
<tr>
  <th>Day</th>
  <th>09:00–09:50</th>
  <th>09:50–10:40</th>
  <th>10:40–11:30</th>
  <th>11:35–12:25</th>
  <th>12:25–13:15</th>
  <th>13:15–14:05</th>
  <th>14:10–15:00</th>
  <th>15:00–15:50</th>
  <th>15:50–16:40</th>
</tr>
</thead>
      <tbody id="ttBody">
      </tbody>
    </table>

  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwV_SjR5wASHwKWjWd-fLlVFFWbc-pGAUUVXcYlEOUbH1JeUnwILr-nMhPvHWLoUW19BQ/exec";
const email=localStorage.getItem("email");

function logout(){
  localStorage.clear();
  location.href="index.html";
}

function post(data){
  return fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(data)
  }).then(r=>r.json());
}

function loadMyTimetable(){

  post({
    action:"getFacultyOwnTimetable",
    email: email
  }).then(r=>{

    if(!r.success){
      alert("No timetable found");
      return;
    }

    const slots=[9,9.5,10.4,11.35,12.25,13.15,14.1,15,15.5];
    const days=["Monday","Tuesday","Wednesday","Thursday","Friday"];

    const body=document.getElementById("ttBody");
    body.innerHTML="";

    days.forEach(d=>{

      let row=`<tr><td>${d}</td>`;

      slots.forEach(s=>{

        const lec=r.data.find(x =>
          x.day===d && Number(x.start)==Number(s)
        );

        if(lec){
          row+=`<td>${lec.subject}<br>${lec.room}</td>`;
        }else{
          row+=`<td></td>`;
        }

      });

      row+="</tr>";
      body.innerHTML+=row;

    });

  });
}

loadMyTimetable();
</script>

</body>
</html>
